name: Deploy API

on:
  # Manuel uniquement : declenche depuis l'onglet Actions de GitHub.
  # Volontairement pas d'auto-deploy sur push main : on prefere un acte
  # explicite pour eviter de cramer le quota Cloudflare ou pousser un fix
  # urgent par accident.
  workflow_dispatch:
    inputs:
      reason:
        description: 'Raison du deploy (visible dans les logs)'
        required: false
        default: 'Manual deploy'

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy mealendar-api to cloudflare workers
    runs-on: ubuntu-latest
    if: github.repository == 'florianbematol/mealendar'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Deploy Worker
        # Doc : https://github.com/cloudflare/wrangler-action
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy
          # On ne pousse PAS les secrets via CI (SUPABASE_*, GEMINI_*, etc.).
          # Ils doivent etre configures une fois manuellement via :
          #   cd apps/api && wrangler secret put SUPABASE_URL
          # ... pour chaque variable. Voir README racine.
          packageManager: pnpm

      - name: Summary
        if: always()
        run: |
          echo "## Deploy API result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reason: ${{ inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
