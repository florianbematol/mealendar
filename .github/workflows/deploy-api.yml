name: Deploy API

on:
  # Manuel : declenche depuis l'onglet Actions
  workflow_dispatch:
  # Auto : apres un push sur main qui touche au backend
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy mealendar-api to cloudflare workers
    runs-on: ubuntu-latest
    # Eviter les deploiements depuis les forks
    if: github.repository == 'florianbematol/mealendar'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Deploy Worker
        # Doc : https://github.com/cloudflare/wrangler-action
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy
          # On ne pousse PAS les secrets via CI (SUPABASE_*, GEMINI_*, etc.).
          # Ils doivent etre configures une fois manuellement via :
          #   cd apps/api && wrangler secret put SUPABASE_URL
          # ... pour chaque variable. Voir README racine.
          packageManager: pnpm
